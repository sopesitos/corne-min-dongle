# GitHub Actions build matrix: corne-min halves + a bare nice!nano dongle.
---
include:
  - board: corne_min_left
    shield: rgbled_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n -DCONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
    artifact-name: corne_min_left_with_studio
  - board: corne_min_right
    shield: rgbled_adapter
    cmake-args: -DCONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
    artifact-name: corne_min_right

  - board: seeeduino_xiao_ble
    shield: corne_min_dongle prospector_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
    artifact-name: prospector_for_corne_min
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: prospector_settings_reset

  - board: corne_min_left
    shield: rgbled_adapter
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_min_left_for_prospector
  - board: corne_min_right
    shield: rgbled_adapter
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_min_right_for_prospector
  - board: corne_min_left
    shield: settings_reset
    artifact-name: corne_min_settings_reset

  # --- bare nice!nano dongle (your addition) ---
  - board: nice_nano_v2
    shield: corne_min_dongle
    artifact-name: corne_min_dongle_nicenano
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: nicenano_settings_reset
  - board: corne_min_right
    shield: settings_reset
    artifact-name: corne_min_right_settings_reset
